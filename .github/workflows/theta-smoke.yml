name: theta-smoke
# Proves the two things Sprint 3 can only prove against the live feed, on a
# fresh box with no Java, no jar, and no warm library cache:
#
#   1. the Theta Terminal runs on a GitHub Actions runner at all — a Java
#      process that authenticates upstream and serves data over localhost.
#      SPRINTS.md flags this as the sprint's risky part;
#   2. chain fetch returns clean data in CI — the sprint's second exit
#      criterion, and the call Sprint 5 will actually make.
#
# Unit tests cannot cover either: they mock the Terminal and the network by
# design, so a real API change would leave them green.
#
# Dispatch-only rather than scheduled: it proves the environment, and the daily
# IV job is what actually needs to run every day. Kept afterwards as the first
# thing to reach for when that job fails for environmental reasons.
on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    # A hung Terminal would otherwise sit until the runner's 6-hour default.
    timeout-minutes: 15
    env:
      THETADATA_API_KEY: ${{ secrets.THETADATA_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
      - run: uv sync

      # The runner has no Java. Theta Terminal v3 requires 21+; 25 matches what
      # the Codespace runs, so local and CI exercise the same runtime.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: check secret is present
        run: |
          if [ -z "$THETADATA_API_KEY" ]; then
            echo "::error::missing repository secret: THETADATA_API_KEY"
            exit 1
          fi

      # vendor/ is gitignored (the jar bootstraps ~98MB of libraries), so every
      # run downloads it fresh. This is the cold-start path by design — it is
      # what the daily job will do too.
      - name: download Theta Terminal
        run: |
          mkdir -p vendor
          curl -sSfL -o vendor/ThetaTerminalv3.jar \
            https://downloads.thetadata.us/ThetaTerminalv3.jar
          ls -lh vendor/ThetaTerminalv3.jar

      # Starts the Terminal, derives a real ATM IV, and asserts the paywalled
      # endpoint still raises rather than returning empty. Exits non-zero on any
      # failure, including an implausible IV.
      - name: theta smoke test
        run: uv run python scripts/theta_smoke.py

      # Sprint 3's second exit criterion: chain fetch returns clean data in CI.
      # Fetches a whole AAPL chain and checks the numbers are defensible —
      # deltas signed and monotonic, put-call delta parity at the money, IVs
      # plausible, the chain straddling spot and not truncated. Runs even if
      # the IV smoke above failed, so one dispatch reports on both pipes rather
      # than hiding the second behind the first.
      - name: chain smoke test
        if: '!cancelled()'
        run: uv run python scripts/chain_smoke.py
