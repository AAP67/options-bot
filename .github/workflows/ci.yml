name: ci
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # daily 2:00 UTC heartbeat — proves cron fires
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest
